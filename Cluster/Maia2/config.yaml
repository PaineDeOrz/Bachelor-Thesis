# General Settings
data_root: "dataset"
seed: 42
num_workers: 25
verbose: 1
max_epochs: 1
max_ply: 300
clock_threshold: 0
chunk_size: 2000
start_year: 2020
start_month: 1
end_year: 2020
end_month: 10
from_checkpoint: false
num_cpu_left: 8
queue_length: 2

# Training Parameters
lr: 0.0001
wd: 0.00001
batch_size: 16000
first_n_moves: 0
last_n_moves: 0

# Model Architecture
dim_cnn: 256
dim_vit: 1024
num_blocks_cnn: 5
num_blocks_vit: 2
input_channels: 18
vit_length: 8
elo_dim: 128

# Feature and Loss Settings
side_info: true
side_info_coefficient: 1.0
value: true
value_coefficient: 1.0
max_games_per_elo_range: 1000000
